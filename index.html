<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Card - Confere Aí</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="cabecalho">
        <h1>Confere Aí</h1>
        <nav>
            <a href="#" class="cabecalho-link">Início</a>
        </nav>
    </header>

    <main>
        <h2>Descubra a verdade passando o mouse</h2>

        <!-- CARD 1 -->
        <article class="cartao">
            <div class="cartao-interno">

                <div class="cartao-frente">
                    <img src="IMAGEM_1.jpg" alt="Imagem 1" class="cartao-imagem">
                    <p>Essa afirmação parece verdadeira?</p>
                </div>

                <div class="cartao-verso">
                    <img src="IMAGEM_1.jpg" alt="Imagem 1" class="cartao-imagem">
                    <p>Aqui está a explicação correta da imagem 1.</p>
                </div>

            </div>
        </article>

        <!-- CARD 2 -->
        <article class="cartao">
            <div class="cartao-interno">

                <div class="cartao-frente">
                    <img src="IMAGEM_2.jpg" alt="Imagem 2" class="cartao-imagem">
                    <p>Essa afirmação é verdadeira ou falsa?</p>
                </div>

                <div class="cartao-verso">
                    <img src="IMAGEM_2.jpg" alt="Imagem 2" class="cartao-imagem">
                    <p>Explicação correta da imagem 2.</p>
                </div>

            </div>
        </article>

    </main>

    <footer>
        <p>Projeto feito por Gabriel M.N</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
