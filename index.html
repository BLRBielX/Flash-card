<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
    <title>Flash Card - Confere Aí</title>
   
</head>
<body>

<header class="cabecalho">
    <h1>Confere Aí</h1>
    <nav>
        <a href="#" class="cabecalho-link">Início</a>
    </nav>
</header>

<main>
    <h2>Descubra a verdade passando o mouse</h2>

    <!-- CARD 1 -->
    <article class="cartao">
        <div class="cartao-interno">

            <div class="cartao-frente">
                <img src="img/praia.jpg" alt="Praia vista de uma caverna" class="cartao-imagem">
                <p>Essa imagem parece de outro planeta?</p>
            </div>

            <div class="cartao-verso">
                <img src="img/praia.jpg" alt="Praia vista de uma caverna" class="cartao-imagem">
                <p>Na verdade é uma praia vista de dentro de uma caverna.</p>
            </div>

        </div>
    </article>

    <!-- CARD 2 -->
    <article class="cartao">
        <div class="cartao-interno">

            <div class="cartao-frente">
                <img src="img/montanha.jpg" alt="Rio entre montanhas" class="cartao-imagem">
                <p>Esse rio é artificial?</p>
            </div>

            <div class="cartao-verso">
                <img src="img/montanha.jpg" alt="Rio entre montanhas" class="cartao-imagem">
                <p>Não. É um rio natural em meio às montanhas.</p>
            </div>

        </div>
    </article>

</main>

<footer>
    <p>Projeto feito por Gabriel M.N</p>
</footer>

<script src="script.js"></script>

</body>
</html>
